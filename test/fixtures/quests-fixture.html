<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0c12; --surface: #13141f; --surface2: #1c1e2e;
      --border: #2a2d42; --text: #e6e6ef; --muted: #8888aa;
      --danger: #e05252; --success: #3ecf8e; --warning: #f6c90e;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; padding: 16px; }
    button { cursor: pointer; border: none; border-radius: 6px; padding: 7px 16px; font-size: 0.9rem; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 0.8rem; }
    .tbl-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: var(--surface2); color: var(--muted); font-size: 0.78rem; padding: 9px 10px; text-align: left; }
    tbody tr { border-top: 1px solid var(--border); }
    tbody td { padding: 9px 10px; vertical-align: middle; font-size: 0.9rem; }
    .drag-handle { cursor: grab; color: var(--muted); user-select: none; padding: 0 4px; }
    .tbl-actions { display: flex; gap: 6px; }
    .badge { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: 0.78rem; font-weight: 600; }
    .badge-active { background: #3a3000; color: var(--warning); }
    .badge-done   { background: #003322; color: var(--success); }
    .badge-failed { background: #2e0000; color: var(--danger); }
    .badge-paused { background: #1e1e2e; color: var(--muted); }

    /* Quest accordion */
    .quest-row { cursor: pointer; }
    .quest-desc {
      color: var(--muted);
      font-size: 0.85em;
      margin-top: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .quest-note-cell {
      max-width: 160px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    tr.quest-expanded .quest-desc,
    tr.quest-expanded .quest-note-cell {
      display: block;
      overflow: visible;
    }
    tr.quest-expanded .quest-note-cell { white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="tbl-wrap">
    <table id="questTable">
      <thead><tr>
        <th></th><th>Куест</th><th>Статус</th>
        <th>Дадено от</th><th>Награда</th><th>Бележки</th><th></th>
      </tr></thead>
      <tbody id="questBody"></tbody>
    </table>
  </div>

  <script>
    const BADGE = {
      'Активен': 'badge-active', 'Изпълнен': 'badge-done',
      'Провален': 'badge-failed', 'Паузиран': 'badge-paused'
    };
    const NEXT_STATUS = {
      'Активен': 'Изпълнен', 'Изпълнен': 'Паузиран',
      'Паузиран': 'Активен',  'Провален': 'Активен'
    };

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let quests = [
      {
        name: 'Куест 1',
        status: 'Активен',
        desc: 'Кратко описание.',
        giver: 'NPC',
        reward: '100 GP',
        note: 'Кратка бележка.'
      },
      {
        name: 'да се съберат некромансърските книги',
        status: 'Активен',
        desc: '8 некромансърски тома на нагаш. толкова аванс, че за простосмъртен са неразбираеми. Твоята книга е просто книга с всички знания за училището по некромания, които един смъртен може да разбере. Събирането на тези книги може да върне цивилизацията на гигантите.',
        giver: '',
        reward: '',
        note: 'всяка книга е в същество, не работат сами по себе си. всяка си има собствено проявление. не знае къде са, но няма да ги търсим сами ние. 1 намерена води до намирането на следващата. Книгите на Нагаш могат да ги върнат като немъртви.'
      }
    ];

    let expandedQuestIdx = null;

    function renderQuests() {
      const tbody = document.getElementById('questBody');
      if (!quests.length) {
        tbody.innerHTML = `<tr><td colspan="7">Няма куестове.</td></tr>`;
        return;
      }
      tbody.innerHTML = quests.map((q, i) => `
        <tr class="quest-row" data-idx="${i}">
          <td><span class="drag-handle">☰</span></td>
          <td>
            <strong>${esc(q.name)}</strong>
            ${q.desc ? `<div class="quest-desc">${esc(q.desc)}</div>` : ''}
          </td>
          <td>
            <span class="badge ${BADGE[q.status]||'badge-paused'}">${q.status}</span><br>
            <button class="btn-ghost btn-sm" style="margin-top:4px" onclick="cycleStatus(${i})">${NEXT_STATUS[q.status]||'Активен'} →</button>
          </td>
          <td>${esc(q.giver||'—')}</td>
          <td>${esc(q.reward||'—')}</td>
          <td><div class="quest-note-cell">${esc(q.note||'')}</div></td>
          <td><div class="tbl-actions">
            <button class="btn-ghost btn-sm" onclick="editQuest(${i})">✏</button>
            <button class="btn-danger btn-sm" onclick="deleteQuest(${i})">🗑</button>
          </div></td>
        </tr>`).join('');

      tbody.querySelectorAll('tr[data-idx]').forEach(tr => {
        tr.addEventListener('click', e => {
          if (e.target.closest('button, .drag-handle')) return;
          const idx = +tr.dataset.idx;
          const wasExpanded = expandedQuestIdx === idx;
          tbody.querySelectorAll('tr.quest-expanded').forEach(r => r.classList.remove('quest-expanded'));
          expandedQuestIdx = wasExpanded ? null : idx;
          if (!wasExpanded) tr.classList.add('quest-expanded');
        });
      });

      if (expandedQuestIdx !== null) {
        const r = tbody.querySelector(`tr[data-idx="${expandedQuestIdx}"]`);
        if (r) r.classList.add('quest-expanded');
      }
    }

    function cycleStatus(i) {
      const q = quests.splice(i, 1)[0];
      q.status = NEXT_STATUS[q.status] || 'Активен';
      quests.unshift(q);
      renderQuests();
    }

    function editQuest(i) { /* stub for fixture */ }

    function deleteQuest(i) {
      if (!confirm(`Изтрий куест "${quests[i].name}"?`)) return;
      quests.splice(i, 1);
      renderQuests();
    }

    renderQuests();

    window._quests = quests;
    window._renderQuests = renderQuests;
  </script>
</body>
</html>
